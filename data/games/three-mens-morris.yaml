notes: >
  Three men's morris is the "movement" extension of three-in-a-row (it is to
  tic-tac-toe what nine men's morris is to a placement-only mill game). Each
  player has three pieces. PLACEMENT PHASE: players alternately place their three
  pieces. MOVEMENT PHASE: if no line has formed, players alternately slide a piece
  to an adjacent point. A player wins by getting their three pieces on one of the
  eight lines (3 rows, 3 columns, 2 diagonals), or by leaving the opponent with no
  legal move.

  STRENGTH — strongly solved (this project). We computed the game-theoretic value
  of every reachable position with the game-solver engine (retrograde analysis
  over the Tapatan ruleset: the 3×3 board with diagonals as both mill lines and
  move connections). Result: the first player wins; the centre is the UNIQUE
  winning opening, the four corners draw, and the four edges LOSE for the first
  player. This upgrades the prior record: the earlier published work (Jim Randell's
  New Scientist #245 solver, 2023) only weakly solved the centre line — it
  hard-codes the centre opening and searches that subtree. Ours is the first
  openly reproducible full-tablebase solution we found, and the first to classify
  all nine openings. The movement phase admits repetition, so most positions are
  drawn by non-progress; the solver resolves those correctly (a value for every
  position, not just the start).

  RESULT / RULESET CAVEAT: the value depends on whether the centre opening is
  allowed. Centre allowed ⇒ first-player win (the headline). Centre banned ⇒ the
  best opening is a corner, which draws — which is why most informal rule-sets ban
  the first-player centre. The "draw" some popular sources quote describes that
  restricted variant.

  ATTRIBUTION: the first-player centre win has been understood as folklore for
  centuries (the board appears in the 1283 Libro de los juegos and in far older
  carvings); H. J. R. Murray (1952) is the classical reference. Our contribution
  is the strong solution and the full opening classification, both reproducible
  from the engine.
